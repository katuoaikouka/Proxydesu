<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Error - UV Browser</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .error-code { font-size: 72px; font-weight: bold; color: #ff4d4d; }
        .msg { margin: 20px; font-size: 18px; color: #ccc; }
        .btn { padding: 10px 20px; background: #3b3b3b; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #555; }
    </style>
</head>
<body>
    <div class="error-code">:(</div>
    <div class="msg">接続中にエラーが発生しました。設定またはネットワークを確認してください。</div>
    <a href="index.html" class="btn">ホームに戻る</a>
</body>
</html>
